    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="AEGIS AVM is the ultimate on-chain automation platform for Algorand. Build, deploy, and manage intelligent crypto agents and AVM automations with ease on Algorand Testnet." />

    <!-- Open Graph / Facebook -->

    <script>
      // Prevent flash of wrong theme
      (function(){
        var t=localStorage.getItem('aegis-theme')||'dark';
        var d=t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
        if(d)document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme=d?'dark':'light';
      })();

      // Node.js globals polyfill for algosdk/crypto
      window.global = window.global || window;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
